<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" fill="none" opacity="0.15">
  <!-- Rudraksh bead chain pattern — repeating beads connected by a thread -->
  <!-- Thread -->
  <line x1="0" y1="40" x2="600" y2="40" stroke="#c18d52" stroke-width="1"/>

  <!-- Beads with texture lines -->
  <g transform="translate(40,40)">
    <circle r="16" fill="#8B4513" fill-opacity="0.4" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#c18d52" stroke-width="0.4"/>
    <circle r="4" fill="#c18d52" fill-opacity="0.3"/>
  </g>
  <g transform="translate(120,40)">
    <circle r="12" fill="#8B4513" fill-opacity="0.3" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <circle r="3" fill="#c18d52" fill-opacity="0.25"/>
  </g>
  <g transform="translate(200,40)">
    <circle r="16" fill="#8B4513" fill-opacity="0.4" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#c18d52" stroke-width="0.4"/>
    <circle r="4" fill="#c18d52" fill-opacity="0.3"/>
  </g>
  <g transform="translate(280,40)">
    <circle r="12" fill="#8B4513" fill-opacity="0.3" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <circle r="3" fill="#c18d52" fill-opacity="0.25"/>
  </g>
  <g transform="translate(360,40)">
    <circle r="16" fill="#8B4513" fill-opacity="0.4" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#c18d52" stroke-width="0.4"/>
    <circle r="4" fill="#c18d52" fill-opacity="0.3"/>
  </g>
  <g transform="translate(440,40)">
    <circle r="12" fill="#8B4513" fill-opacity="0.3" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#c18d52" stroke-width="0.3"/>
    <circle r="3" fill="#c18d52" fill-opacity="0.25"/>
  </g>
  <g transform="translate(520,40)">
    <circle r="16" fill="#8B4513" fill-opacity="0.4" stroke="#c18d52" stroke-width="0.8"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c18d52" stroke-width="0.4"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#c18d52" stroke-width="0.4"/>
    <circle r="4" fill="#c18d52" fill-opacity="0.3"/>
  </g>

  <!-- Small spacer beads -->
  <circle cx="80" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="160" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="240" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="320" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="400" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="480" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
  <circle cx="560" cy="40" r="4" fill="#c18d52" fill-opacity="0.25"/>
</svg>
